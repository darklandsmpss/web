<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkLand — Reporte SS</title>
<style>
  :root { --gray-dark:#1a1a1a; --gray-mid:#2e2e2e; --gray-light:#4a4a4a; --white:#f0f0f0; --accent:#888; --border:#555; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--gray-dark); color:var(--white); font-family:Arial,sans-serif; min-height:100vh; }
  #chunk-loader { position:fixed; inset:0; background:#111; z-index:999; display:grid; grid-template-columns:repeat(8,1fr); grid-template-rows:repeat(8,1fr); }
  .chunk { background:var(--gray-mid); border:1px solid #222; opacity:0; transform:scale(0.6); transition:opacity .25s ease,transform .25s ease; }
  .chunk.loaded { opacity:1; transform:scale(1); }
  #chunk-loader.done { display:none; }
  .bg-grid { position:fixed; inset:0; background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; }
  #app { opacity:0; animation:slideUp .6s ease .2s forwards; padding:30px 20px; max-width:680px; margin:0 auto; }
  @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  .header { text-align:center; margin-bottom:24px; }
  .header h1 { font-size:1.5rem; font-weight:900; margin-bottom:4px; }
  .header .sub { color:var(--accent); font-size:.85rem; }
  .header .user-badge { display:inline-block; margin-top:10px; padding:5px 14px; background:var(--gray-mid); border:1px solid var(--border); border-radius:3px; font-size:.8rem; color:var(--accent); }
  .counter-box { background:var(--gray-mid); border:1px solid var(--border); border-radius:4px; padding:16px 20px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; }
  .counter-label { color:var(--accent); font-size:.85rem; }
  .counter-num { font-size:2rem; font-weight:900; color:var(--white); }
  .card { background:var(--gray-mid); border:1px solid var(--border); border-radius:4px; padding:28px; margin-bottom:20px; }
  .card-title { font-size:1rem; font-weight:700; margin-bottom:18px; }
  .date-row { display:flex; align-items:center; gap:8px; margin-bottom:18px; padding:10px 14px; background:var(--gray-dark); border:1px solid var(--border); border-radius:3px; font-size:.9rem; color:var(--accent); }
  .form-group { margin-bottom:16px; }
  .form-group label { display:flex; align-items:center; gap:6px; font-size:.8rem; color:var(--accent); margin-bottom:5px; text-transform:uppercase; }
  .form-group input, .form-group select, .form-group textarea { width:100%; padding:10px 13px; background:var(--gray-dark); border:1px solid var(--border); border-radius:3px; color:var(--white); font-family:Arial,sans-serif; font-size:.95rem; outline:none; transition:border-color .2s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:#888; }
  .form-group select option { background:var(--gray-dark); }
  .form-group textarea { resize:vertical; min-height:75px; }
  .required-dot { color:#f99; }
  .invalid { border-color:#7a3030 !important; animation:shake .3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  .divider { height:1px; background:var(--border); margin:20px 0; }
  .btn-send { width:100%; padding:13px; background:var(--gray-light); border:1px solid var(--border); border-radius:3px; color:var(--white); font-family:Arial,sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:background .2s,transform .1s; }
  .btn-send:hover { background:#5a5a5a; transform:translateY(-1px); }
  .msg { margin-top:12px; padding:10px 14px; border-radius:3px; font-size:.9rem; font-weight:600; display:none; }
  .msg.success { background:#1a3a1a; border:1px solid #307a30; color:#9f9; display:block; }
  .msg.error { background:#3a1a1a; border:1px solid #7a3030; color:#f99; display:block; }
  .history-card { background:var(--gray-dark); border:1px solid var(--border); border-radius:4px; padding:16px; margin-bottom:12px; animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .h-date { font-size:.75rem; color:var(--accent); margin-bottom:8px; }
  .h-row { display:flex; gap:8px; margin-bottom:4px; flex-wrap:wrap; }
  .h-label { font-size:.75rem; color:var(--accent); min-width:90px; text-transform:uppercase; }
  .h-value { font-size:.9rem; font-weight:600; color:var(--white); }
  .ban-badge { display:inline-block; padding:2px 8px; border-radius:3px; font-size:.75rem; font-weight:700; background:#5a1a1a; color:#f99; border:1px solid #7a3030; }
  .no-history { text-align:center; color:var(--accent); font-size:.85rem; padding:16px; }
  .btn-logout { display:block; margin:16px auto 0; padding:8px 18px; background:transparent; border:1px solid var(--border); border-radius:3px; color:var(--accent); font-family:Arial,sans-serif; font-size:.9rem; cursor:pointer; transition:color .2s,border-color .2s; }
  .btn-logout:hover { color:var(--white); border-color:#888; }
  footer { text-align:center; padding:20px; color:var(--accent); font-size:.75rem; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.02)} 100%{transform:scale(1)} }
  .sent-anim { animation:pop .4s ease; }
</style>
</head>
<body>
<div id="chunk-loader"><script>for(let x=0;x<64;x++) document.write('<div class="chunk"></div>');</script></div>
<div class="bg-grid"></div>
<div id="app">
  <div class="header">
    <h1>⚔️ DARKLAND SS ⚔️</h1>
    <div class="sub">© DarkLand — Panel de Reportes</div>
    <div class="user-badge">👤 <span id="username-display">—</span></div>
  </div>

  <div class="counter-box">
    <div class="counter-label">📊 Reportes enviados por ti</div>
    <div class="counter-num" id="my-counter">0</div>
  </div>

  <div class="card" id="report-card">
    <div class="card-title">📋 FORMULARIO DE REPORTE</div>
    <div class="date-row">📅 Fecha: <strong id="fecha-display">—</strong></div>
    <div class="form-group">
      <label>👤 Usuario (al que le harás ss) <span class="required-dot">*</span></label>
      <input type="text" id="f-usuario" placeholder="Nombre del usuario">
    </div>
    <div class="form-group">
      <label>🛡️ Staff (quien hará el ss) <span class="required-dot">*</span></label>
      <input type="text" id="f-staff" placeholder="Tu nombre de staff">
    </div>
    <div class="form-group">
      <label>🔍 Sospechas <span class="required-dot">*</span></label>
      <textarea id="f-sospechas" placeholder="Describe las sospechas observadas..."></textarea>
    </div>
    <div class="form-group">
      <label>⚒️ Mods encontrados <span class="required-dot">*</span></label>
      <textarea id="f-mods" placeholder="Mods o hacks encontrados..."></textarea>
    </div>
    <div class="form-group">
      <label>🔨 Ban / Refuse <span class="required-dot">*</span></label>
      <select id="f-ban">
        <option value="">— Selecciona —</option>
        <option value="BAN ❌">BAN ❌</option>
        <option value="REFUSE 🚫">REFUSE 🚫</option>
        <option value="LIMPIO ✅">LIMPIO ✅</option>
      </select>
    </div>
    <div class="form-group">
      <label>⏱️ Duración <span class="required-dot">*</span></label>
      <select id="f-dia">
        <option value="">— Selecciona —</option>
        <option value="1 día">1 día</option>
        <option value="3 días">3 días</option>
        <option value="7 días">7 días</option>
        <option value="15 días">15 días</option>
        <option value="30 días">30 días</option>
        <option value="Permanente 🔒">Permanente 🔒</option>
      </select>
    </div>
    <div class="divider"></div>
    <button class="btn-send" onclick="sendReport()">📤 ENVIAR REPORTE</button>
    <div class="msg" id="report-msg"></div>
  </div>

  <div class="card">
    <div class="card-title">🕓 MIS REPORTES ENVIADOS</div>
    <div id="my-history"><div class="no-history">Aún no has enviado reportes.</div></div>
  </div>

  <button class="btn-logout" onclick="logout()">🚪 Cerrar sesión</button>
  <footer>© 2025 DarkLand — All rights reserved</footer>
</div>
<script>
window.onload = () => {
  if (localStorage.getItem('maintenance') === '1') {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0d0d0d;font-family:Arial,sans-serif;font-size:1.5rem;color:#f0f0f0;text-align:center;line-height:2;padding:20px;">🚫<br>MEJORANDO<br>PAGINA<br>🚫</div>';
    return;
  }
  const user = localStorage.getItem('loggedUser');
  if (!user) { window.location.href = 'index.html'; return; }
  document.getElementById('username-display').textContent = user;
  setDate(); loadChunks(); loadMyHistory();
};
function loadChunks() {
  const chunks = document.querySelectorAll('.chunk'); let i = 0;
  function next() { if (i < chunks.length) { chunks[i++].classList.add('loaded'); setTimeout(next, 18); } else setTimeout(() => document.getElementById('chunk-loader').classList.add('done'), 300); }
  next();
}
function setDate() {
  document.getElementById('fecha-display').textContent = new Date().toLocaleDateString('es-ES', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
}
function loadMyHistory() {
  const user = localStorage.getItem('loggedUser');
  const mine = JSON.parse(localStorage.getItem('dl_reports') || '[]').filter(r => r.sender === user);
  document.getElementById('my-counter').textContent = mine.length;
  const container = document.getElementById('my-history');
  if (!mine.length) { container.innerHTML = '<div class="no-history">Aún no has enviado reportes.</div>'; return; }
  container.innerHTML = [...mine].reverse().map(r => `
    <div class="history-card">
      <div class="h-date">📅 ${r.fecha}</div>
      <div class="h-row"><span class="h-label">👤 Usuario</span><span class="h-value">${r.usuario}</span></div>
      <div class="h-row"><span class="h-label">🛡️ Staff</span><span class="h-value">${r.staff}</span></div>
      <div class="h-row"><span class="h-label">🔨 Resultado</span><span class="h-value"><span class="ban-badge">${r.ban}</span></span></div>
      <div class="h-row"><span class="h-label">⏱️ Duración</span><span class="h-value">${r.dia}</span></div>
    </div>`).join('');
}
function sendReport() {
  const fields = ['f-usuario','f-staff','f-sospechas','f-mods','f-ban','f-dia'];
  let valid = true;
  fields.forEach(id => { const el = document.getElementById(id); el.classList.remove('invalid'); if (!el.value.trim()) { el.classList.add('invalid'); valid = false; setTimeout(() => el.classList.remove('invalid'), 500); } });
  const msg = document.getElementById('report-msg');
  if (!valid) { msg.className = 'msg error'; msg.textContent = '⚠️ Completa todos los campos antes de enviar.'; return; }
  const report = {
    id: Date.now(),
    fecha: new Date().toLocaleDateString('es-ES', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' }),
    usuario: document.getElementById('f-usuario').value.trim(),
    staff: document.getElementById('f-staff').value.trim(),
    sospechas: document.getElementById('f-sospechas').value.trim(),
    mods: document.getElementById('f-mods').value.trim(),
    ban: document.getElementById('f-ban').value,
    dia: document.getElementById('f-dia').value,
    sender: localStorage.getItem('loggedUser'),
  };
  const reports = JSON.parse(localStorage.getItem('dl_reports') || '[]');
  reports.push(report);
  localStorage.setItem('dl_reports', JSON.stringify(reports));
  msg.className = 'msg success'; msg.textContent = '✅ Reporte enviado correctamente.';
  document.getElementById('report-card').classList.add('sent-anim');
  setTimeout(() => document.getElementById('report-card').classList.remove('sent-anim'), 400);
  ['f-usuario','f-staff','f-sospechas','f-mods'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-ban').value = ''; document.getElementById('f-dia').value = '';
  loadMyHistory();
}
function logout() { localStorage.removeItem('loggedUser'); window.location.href = 'index.html'; }
</script>
</body>
</html>
